# Cross-provider evaluation sweep (AI-SPEC §7.5).
#
# Runs the cloud legs of CrossProviderTests (Claude / OpenAI / Gemini) against
# the 35-fixture suite with per-provider tolerances, enforcing the release-
# blocker bar (dims 3/4/6 at 100%). API keys come from repo secrets and are
# exported as env vars; the harness writes them into a TEST-scoped Keychain at
# setUp, so the production Keychain is never touched.
#
# NOTE: the Apple FM and Ollama legs do NOT run here — GitHub-hosted macOS
# runners have no Apple Intelligence and no Ollama daemon, so those tests skip.
# Run them locally / on self-hosted runners. Cost ceiling per AI-SPEC §7.5 is
# < $0.10 per cloud sweep (~$0.01-0.03 actual for 35 fixtures × 3 providers).
#
# This workflow is intentionally NOT triggered on push — only weekly + manual.

name: eval-providers

on:
  workflow_dispatch:
  schedule:
    # Sunday 0200 UTC (AI-SPEC §7.5).
    - cron: "0 2 * * 0"

# IN-01: pin the token to read-only (mirrors ci.yml) — this is the one workflow
# that handles repo secrets, so it must not inherit a potentially read-write
# repository default.
permissions:
  contents: read

jobs:
  eval-cloud-providers:
    name: Cloud provider eval sweep
    runs-on: macos-26
    env:
      JOTTY_TEST_CLOUD_PROVIDERS: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # IN-02: pin the toolchain explicitly (same step + rationale as ci.yml) so
      # image-default Xcode bumps can't silently diverge eval from CI. Non-fatal:
      # falls back to the image default if that exact version has rotated off.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app || sudo xcode-select -p

      # WR-01: `exit 0` alone marks the STEP successful and the workflow proceeds —
      # the guard must gate the remaining steps via a step output, or a keyless
      # weekly run spins up XcodeGen + xcodebuild for nothing (and goes red).
      - name: Guard — require at least one provider key
        id: keys
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENAI_API_KEY" ] && [ -z "$GEMINI_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No provider keys configured — skipping"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "At least one provider key present — proceeding with cloud sweep."
          fi

      - name: Install XcodeGen
        if: steps.keys.outputs.present == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.keys.outputs.present == 'true'
        run: xcodegen generate

      # GitHub macOS runners can present a locked default keychain to test
      # processes (actions/runner-images#4519), making SecItemAdd fail with
      # errSecInteractionNotAllowed (-25308). The eval harness writes provider
      # keys into a TEST-scoped Keychain at setUp via real SecItemAdd calls —
      # the same failure class ci.yml guards against, so mirror its prep here.
      # As in ci.yml (WR-07), the new keychain must ALSO join the search list:
      # SecItemAdd targets the default keychain, but SecItemCopyMatching
      # searches the search list, so without list-keychains a write-then-read
      # round-trip can fail with errSecItemNotFound (-25300).
      - name: Prepare unlocked keychain
        if: steps.keys.outputs.present == 'true'
        run: |
          security create-keychain -p "" ci.keychain
          security list-keychains -d user -s ci.keychain login.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "" ci.keychain
          security set-keychain-settings ci.keychain

      - name: Run cross-provider eval (cloud legs)
        if: steps.keys.outputs.present == 'true'
        run: |
          xcodebuild test \
            -scheme Jotty \
            -only-testing:JottyTests/CrossProviderTests \
            -destination 'platform=macOS'

      - name: Upload eval-run reports
        if: always() && steps.keys.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-runs
          path: ~/Library/Application Support/Jotty/debug/eval-runs/
          if-no-files-found: warn
