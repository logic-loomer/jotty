name: Jotty
options:
  bundleIdPrefix: com.jotty
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "26.0"
  ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Jotty:
    type: application
    platform: macOS
    sources:
      - path: Jotty
        excludes:
          - "Info.plist"
    info:
      path: Jotty/Info.plist
      properties:
        CFBundleName: Jotty
        CFBundleDisplayName: Jotty
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "2"
        LSUIElement: true
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: ""
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        NSCalendarsFullAccessUsageDescription: "Jotty creates calendar events for your time-blocked tasks and shows today's events in the menubar."
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.jotty.Jotty
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
      ENABLE_HARDENED_RUNTIME: YES
      COMBINE_HIDPI_IMAGES: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  JottyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - JottyTests
    resources:
      - path: JottyTests/Resources
        type: folder
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.jotty.JottyTests
      GENERATE_INFOPLIST_FILE: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
      DEVELOPMENT_TEAM: ""
    dependencies:
      - target: Jotty
schemes:
  Jotty:
    build:
      targets:
        Jotty: all
        JottyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JottyTests
