<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Jotty app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#c8efdd"></stop>
      <stop offset="1" stop-color="#5cc3b4"></stop>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"></stop>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"></rect>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"></rect>
    <rect x="0" y="0" width="1024" height="560" fill="url(#gloss)"></rect>
    <rect x="0" y="760" width="1024" height="264" fill="#0a4d46" opacity="0.10"></rect>

    
    <g transform="translate(0,7)" fill="#ffffff" opacity="0.55">
      <rect x="476" y="256" width="72" height="512" rx="36"></rect>
      <rect x="379" y="256" width="266" height="72" rx="36"></rect>
      <rect x="379" y="696" width="266" height="72" rx="36"></rect>
    </g>
    <g fill="#1c8b81">
      <rect x="476" y="256" width="72" height="512" rx="36"></rect>
      <rect x="379" y="256" width="266" height="72" rx="36"></rect>
      <rect x="379" y="696" width="266" height="72" rx="36"></rect>
    </g>
  </g>

  
  <rect x="2" y="2" width="1020" height="1020" rx="229" ry="229" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="4"></rect>
</svg>